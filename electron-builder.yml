appId: com.paperclipai.app
productName: Paperclip Desktop
copyright: Copyright © 2026 Aron Prins

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - package.json

# Auto-update via GitHub Releases
publish:
  provider: github
  owner: aronprins
  repo: paperclip-desktop
  releaseType: release

# Bundle the built server + UI alongside the app.
# node_modules comes from build/server-bundle (npm install --production output).
# dist/ and package.json come from the published @paperclipai/server npm package.
extraResources:
  - from: build/server-bundle/${os}-${arch}/server/dist
    to: app-server/server/dist
    filter:
      - "**/*"
  - from: build/server-bundle/${os}-${arch}/server/ui-dist
    to: app-server/server/ui-dist
    filter:
      - "**/*"
  - from: build/server-bundle/${os}-${arch}/server/node_modules
    to: app-server/server/node_modules
    filter:
      - "**/*"
  - from: build/server-bundle/${os}-${arch}/server/node_modules/@aws-sdk
    to: app-server/server/node_modules/@aws-sdk
    filter:
      - "**/*"
  - from: build/server-bundle/${os}-${arch}/server/node_modules/@aws-crypto
    to: app-server/server/node_modules/@aws-crypto
    filter:
      - "**/*"
  - from: build/server-bundle/${os}-${arch}/server/node_modules/@aws
    to: app-server/server/node_modules/@aws
    filter:
      - "**/*"
  - from: build/server-bundle/${os}-${arch}/server/package.json
    to: app-server/server/package.json
  # Bundled Node.js binary (arch-specific, selected at build time)
  - from: "build/node-bin/${os}-${arch}"
    to: app-server/node-bin
    filter:
      - "**/*"

# ─── macOS ───────────────────────────────────────────────────────────────────

afterPack: scripts/after-pack.mjs
afterSign: scripts/after-sign.mjs

mac:
  category: public.app-category.developer-tools
  icon: build/icon.png
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  signIgnore:
    - "/Contents/Resources/app-server/.*"
    - "\\.pak$"
    - "\\.bin$"
    - "\\.dat$"

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# ─── Windows ─────────────────────────────────────────────────────────────────

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico

# ─── Linux ───────────────────────────────────────────────────────────────────

linux:
  icon: build/icon.png
  category: Development
  maintainer: Aron Prins
  executableName: paperclip
  artifactName: "Paperclip-${version}-${arch}.${ext}"
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
